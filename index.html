<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Degenesis: Alpha</title>
    <style>
      /* Dark theme overrides */
      .v-theme--dark .archetype img, .v-theme--dark .archetypeLogo { filter: invert(1); }
      .v-theme--dark .v-card--variant-elevated { background-color: rgba(30,30,30,0.95) !important; }
      .v-theme--dark .v-card--variant-outlined { border-color: rgba(255,255,255,0.15) !important; }
      .v-theme--dark .v-tab--selected { color: #D32F2F !important; }
      .v-theme--dark .v-tab { color: #fff !important; }
      .v-theme--dark .v-tab .v-btn__content { color: #fff !important; }
      .v-theme--dark .v-tab .v-tab__slider { background-color: #D32F2F !important; }
      .v-theme--dark .v-text-field .v-field__input { color: #e0e0e0; }
      .v-theme--dark .v-navigation-drawer { background-color: #111 !important; }
      .v-theme--dark .v-app-bar { background-color: #111 !important; }
      .v-theme--dark .bg-grey-lighten-2 { background-color: #333 !important; }
      .v-theme--dark .bg-grey-lighten-3 { background-color: #1a1a1a !important; }
      .v-theme--dark .bg-grey-lighten-4 { background-color: #2a2a2a !important; }
      .v-theme--dark .bg-grey-lighten-1 { background-color: #444 !important; }
      .v-theme--dark .bg-white { background-color: #1a1a1a !important; }
      .v-theme--dark .v-btn { color: #e0e0e0 !important; }
      .v-theme--dark .v-btn--active { color: #fff !important; }
      .v-theme--dark .midona-egg { color: #0a0a0a !important; }
      .v-theme--light .midona-egg { color: #FFFFFF !important; }
      /* Point meter tabs (Répartition des Points) — hash-independent */
      .v-theme--dark .v-card--variant-tonal { color: #fff !important; }
      .v-theme--dark .v-card--variant-tonal .v-card-text { color: #fff !important; }
      /* Point boxes - visibility in dark mode — hash-independent */
      .v-theme--dark .box { border-color: #555 !important; }
      .v-theme--dark .box.bg-grey-darken-4 { background-color: #B71C1C !important; }
      .v-theme--dark .box.bg-grey-lighten-2 { background-color: #555 !important; }
      .v-theme--dark .box.bg-grey-lighten-1 { background-color: #555 !important; }
      /* Shared */
      #fill-pdf-btn { box-shadow: 0 4px 16px rgba(183,28,28,0.4) !important; }

      /* ── Rank Tree ── */
      .rank-tree-mount { overflow-x: auto; padding: 8px 0 12px; }
      .rank-tree { position: relative; min-height: 40px; }

      .rank-badge {
        display: inline-flex; align-items: center; gap: 6px;
        height: 26px; padding: 0 14px 0 6px;
        background: #1e1e1e; color: #ddd;
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        white-space: nowrap; cursor: pointer; user-select: none;
        clip-path: polygon(8px 0%, calc(100% - 8px) 0%, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0% 50%);
        transition: background .15s, opacity .15s;
      }
      .rank-badge:hover { background: #333; }
      .rank-badge.eligible { background: #2a2a2a; color: #fff; }
      .rank-badge.eligible:hover { background: #444; }
      .rank-badge.selected { background: #B71C1C; color: #fff; }
      .rank-badge.selected:hover { background: #d32f2f; }
      .rank-badge.disabled { opacity: .35; cursor: default; }
      .rank-badge.disabled:hover { background: #1e1e1e; }

      .rank-lvl {
        display: inline-flex; align-items: center; justify-content: center;
        min-width: 18px; height: 18px; border-radius: 50%;
        border: 1.5px solid #666; font-size: 10px; color: #aaa;
        flex-shrink: 0;
      }
      .rank-badge.selected .rank-lvl { border-color: #ffcdd2; color: #ffcdd2; }
      .rank-badge.eligible .rank-lvl { border-color: #999; color: #ccc; }

      .rank-nm { letter-spacing: .3px; }

      /* Tooltip */
      .rank-tip {
        position: fixed; z-index: 9999;
        background: #222; color: #e0e0e0; border: 1px solid #444;
        border-radius: 6px; padding: 10px 14px;
        font-size: 12px; line-height: 1.5;
        box-shadow: 0 4px 20px rgba(0,0,0,.5);
        pointer-events: none;
        max-height: 50vh; overflow-y: auto;
        opacity: 0; visibility: hidden;
        transition: opacity .15s ease-in-out, visibility .15s;
      }
      .rank-tip.show { opacity: 1; visibility: visible; pointer-events: auto; }
      .rank-tip b { color: #ef9a9a; }

      /* Light theme adjustments */
      .v-theme--light .rank-badge { background: #222; color: #eee; }
      .v-theme--light .rank-badge:hover { background: #3a3a3a; }
      .v-theme--light .rank-badge.eligible { background: #2a2a2a; }
      .v-theme--light .rank-badge.eligible:hover { background: #444; }
      .v-theme--light .rank-tip { background: #fff; color: #333; border-color: #ccc; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
      .v-theme--light .rank-tip b { color: #c62828; }
    </style>
    <script>
      (function(){
        var t=localStorage.getItem("parasite-theme");
        document.documentElement.style.background=(t==="light")?"#FFFFFF":"#0a0a0a";
        new MutationObserver(function(){
          var el=document.querySelector('.v-theme--dark,.v-theme--light');
          if(el){
            if(el.classList.contains('v-theme--dark')){document.documentElement.style.background="#0a0a0a";}
            else{document.documentElement.style.background="#FFFFFF";}
          }
        }).observe(document.documentElement,{attributes:true,subtree:true,attributeFilter:['class']});
      })();
    </script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script defer src="./fill-pdf.js"></script>
    <script defer src="./rank-tree.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
